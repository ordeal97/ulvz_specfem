<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="420" viewBox="0 0 1180 420" role="img" aria-labelledby="title desc"><title id="title">Canonical two-chunk user workflow</title><desc id="desc">A staged workflow from source and patch verification to mesh, databases, solver smoke test, and production validation. Red stop boxes identify conditions that must halt progression.</desc><style>text{font-family:Arial,'Noto Sans CJK SC',sans-serif;fill:#14213d}.title{font-size:23px;font-weight:bold}.step{font-size:16px;font-weight:bold}.small{font-size:13px}.box{fill:#eaf4fb;stroke:#1d3557;stroke-width:2}.stop{fill:#ffe4e4;stroke:#c1121f;stroke-width:2}.note{fill:#fff6df;stroke:#e76f00;stroke-width:1.5}.arrow{stroke:#1d3557;stroke-width:2.5;marker-end:url(#a)}</style><defs><marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8z" fill="#1d3557"/></marker></defs><rect x="18" y="18" width="1144" height="384" rx="12" fill="#fff" stroke="#14213d" stroke-width="2"/><text x="42" y="54" class="title">Canonical two-chunk workflow: user run versus advanced acceptance</text><g><rect x="48" y="105" width="155" height="76" rx="8" class="box"/><text x="67" y="133" class="step">1. Verify source</text><text x="66" y="155" class="small">patch + hash/context</text></g><g><rect x="250" y="105" width="155" height="76" rx="8" class="box"/><text x="270" y="133" class="step">2. Prepare inputs</text><text x="267" y="155" class="small">90°/90°, source, stations</text></g><g><rect x="452" y="105" width="155" height="76" rx="8" class="box"/><text x="470" y="133" class="step">3. Pre-mesh audit</text><text x="475" y="155" class="small">geometry + margins</text></g><g><rect x="654" y="105" width="155" height="76" rx="8" class="box"/><text x="677" y="133" class="step">4. xmeshfem3D</text><text x="677" y="155" class="small">mesh + databases</text></g><g><rect x="856" y="105" width="155" height="76" rx="8" class="box"/><text x="873" y="133" class="step">5. xspecfem3D</text><text x="877" y="155" class="small">short solver smoke</text></g><line x1="203" y1="143" x2="250" y2="143" class="arrow"/><line x1="405" y1="143" x2="452" y2="143" class="arrow"/><line x1="607" y1="143" x2="654" y2="143" class="arrow"/><line x1="809" y1="143" x2="856" y2="143" class="arrow"/><rect x="57" y="239" width="276" height="74" rx="8" class="stop"/><text x="76" y="266" class="step">STOP</text><text x="76" y="288" class="small">hash/context mismatch, non-canonical geometry,</text><text x="76" y="306" class="small">or source/station outside domain</text><line x1="125" y1="181" x2="125" y2="239" class="arrow"/><rect x="371" y="239" width="308" height="74" rx="8" class="note"/><text x="389" y="266" class="step">Face-role rule</text><text x="389" y="288" class="small">AB–AC: internal MPI exchange; never sponge/Stacey.</text><text x="389" y="306" class="small">Only exposed outer faces use regional Stacey.</text><line x1="530" y1="181" x2="530" y2="239" class="arrow"/><rect x="721" y="239" width="392" height="74" rx="8" class="note"/><text x="739" y="266" class="step">Before production / publication</text><text x="739" y="288" class="small">Endpoint topology, Stacey roles, decomposition invariance,</text><text x="739" y="306" class="small">and physical-window waveform regression must pass.</text><line x1="934" y1="181" x2="934" y2="239" class="arrow"/><text x="48" y="364" class="small">Global sponge is rejected for NCHUNKS=2 by current source; use ABSORBING_CONDITIONS=.true. and ABSORB_USING_GLOBAL_SPONGE=.false. for exposed regional faces.</text></svg>
