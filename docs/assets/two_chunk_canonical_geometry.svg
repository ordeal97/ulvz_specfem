<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="670" viewBox="0 0 1200 670" role="img" aria-labelledby="title desc">
<title id="title">Canonical two-chunk local topology and gamma convention</title>
<desc id="desc">The left panel shows central chunk AB and supported-left chunk AC. Their shared internal xi face has endpoints C1 eta-min and C2 eta-max and is never absorbing. The right panel shows a tangent-plane view from outside the Earth; positive gamma is counter-clockwise from North.</desc>
<style>text{font-family:Arial,'Noto Sans CJK SC',sans-serif;fill:#14213d}.title{font-size:23px;font-weight:bold}.label{font-size:18px;font-weight:bold}.small{font-size:15px}.tiny{font-size:13px}.box{fill:#fff;stroke:#14213d;stroke-width:2}.internal{fill:none;stroke:#d62828;stroke-width:4;stroke-dasharray:10 7}.axis{fill:none;stroke:#1d3557;stroke-width:3;marker-end:url(#navy)}.gamma{fill:none;stroke:#e76f00;stroke-width:4;marker-end:url(#orange)}.note{fill:#fff6df;stroke:#e76f00;stroke-width:1.5}.external{stroke:#2a9d8f;stroke-width:5}.panel{fill:#f8fbff;stroke:#8aa4bd;stroke-width:2}</style>
<defs><marker id="navy" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#1d3557"/></marker><marker id="orange" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#e76f00"/></marker></defs>
<rect x="22" y="22" width="1156" height="626" rx="12" fill="#fff" stroke="#14213d" stroke-width="2"/><text x="48" y="58" class="title">Canonical 90° two-chunk geometry: local topology is not a geographic map</text>
<rect x="46" y="84" width="636" height="520" rx="10" class="panel"/><text x="70" y="118" class="label">A. Unrotated local topology (attachment definition)</text>
<rect x="92" y="174" width="242" height="294" rx="5" fill="#dff2e1" class="box"/><rect x="334" y="174" width="242" height="294" rx="5" fill="#dceefa" class="box"/><text x="145" y="211" class="label">AC / chunk 2</text><text x="130" y="234" class="small">supported-left attachment</text><text x="394" y="211" class="label">AB / chunk 1</text><text x="392" y="234" class="small">central chunk</text>
<line x1="334" y1="174" x2="334" y2="468" class="internal"/><text x="306" y="324" class="tiny" transform="rotate(-90 306 324)">shared internal interface</text><circle cx="334" cy="468" r="7" fill="#d62828"/><text x="346" y="493" class="label">C1 = eta-min endpoint</text><circle cx="334" cy="174" r="7" fill="#d62828"/><text x="346" y="161" class="label">C2 = eta-max endpoint</text>
<line x1="455" y1="322" x2="546" y2="322" class="axis"/><text x="554" y="327" class="small">AB +xi</text><line x1="455" y1="322" x2="455" y2="249" class="axis"/><text x="464" y="252" class="small">AB +eta</text><line x1="213" y1="322" x2="121" y2="322" class="axis"/><text x="98" y="327" class="small">AC +xi</text><line x1="213" y1="322" x2="213" y2="249" class="axis"/><text x="222" y="252" class="small">AC +eta</text>
<line x1="92" y1="174" x2="334" y2="174" class="external"/><line x1="92" y1="468" x2="334" y2="468" class="external"/><line x1="92" y1="174" x2="92" y2="468" class="external"/><line x1="576" y1="174" x2="576" y2="468" class="external"/><line x1="334" y1="174" x2="576" y2="174" class="external"/><line x1="334" y1="468" x2="576" y2="468" class="external"/>
<rect x="84" y="515" width="510" height="60" rx="6" class="note"/><text x="100" y="540" class="small">Dashed red: MPI field exchange only — never sponge or Stacey.</text><text x="100" y="562" class="small">Green solid faces: exposed external faces eligible for regional Stacey roles.</text>
<rect x="712" y="84" width="442" height="520" rx="10" class="panel"/><text x="736" y="118" class="label">B. Whole-system orientation (tangent-plane view)</text><text x="736" y="141" class="small">View from outside Earth looking down at the central point.</text><circle cx="933" cy="337" r="136" fill="#eef5fb" stroke="#8aa4bd" stroke-width="2"/><circle cx="933" cy="337" r="7" fill="#111"/><text x="946" y="357" class="small">central point</text><line x1="933" y1="337" x2="933" y2="185" class="axis"/><text x="942" y="190" class="label">North</text><line x1="933" y1="337" x2="1085" y2="337" class="axis"/><text x="1040" y="328" class="label">East</text><line x1="933" y1="337" x2="933" y2="222" class="axis"/><text x="944" y="245" class="small">gamma=0: +eta</text><line x1="933" y1="337" x2="1046" y2="337" class="axis"/><text x="966" y="323" class="small">gamma=0: +xi</text><path d="M933,166 A171,171 0 0 0 762,337" class="gamma"/><text x="748" y="235" class="label" fill="#e76f00">+gamma</text><text x="735" y="256" class="small">counter-clockwise from North</text><rect x="745" y="488" width="380" height="83" rx="6" class="note"/><text x="760" y="512" class="small">gamma 0°: +eta North, +xi East</text><text x="760" y="534" class="small">gamma 90°: +eta West, +xi North</text><text x="760" y="556" class="small">gamma 180°: +eta South, +xi West</text><text x="48" y="630" class="tiny">Source basis: current Euler matrix (src/shared/euler_angles.f90), regional manual §5, accepted canonical fixture. AB/AC names denote cubed-sphere face roles, not compass directions.</text>
</svg>
