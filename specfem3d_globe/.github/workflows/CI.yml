        TESTDIR: EXAMPLES/regional_Greece_noise_small
      run: ./.github/scripts/run_tests.sh
      shell: bash

  linuxTest_18:
    name: Test 18 - regional w/ NGLL 6
    runs-on: ubuntu-latest
    needs: [compilationChecks]

    steps:
    - uses: actions/checkout@v4

    - name: Install packages
      run: ./.github/scripts/run_install.sh
      shell: bash

    - name: Run build
      env:
        TESTFLAGS: --enable-vectorization
        TESTNGLL: 6
      run: ./.github/scripts/run_build.sh
      shell: bash

    - name: Run test
      env:
        TESTDIR: EXAMPLES/regional_Greece_small
        DEBUG: true
      run: ./.github/scripts/run_tests.sh
      shell: bash


  # intermediate workflow check
  exampleChecks:
    needs: [linuxTest_0,linuxTest_1,linuxTest_2,linuxTest_3,linuxTest_4,linuxTest_5,
            linuxTest_6,linuxTest_7,linuxTest_8,linuxTest_9,linuxTest_10,
            linuxTest_11,linuxTest_12,linuxTest_13,linuxTest_14,linuxTest_15,
            linuxTest_16,linuxTest_17,linuxTest_18]
    runs-on: ubuntu-latest
    steps:
    - run: echo "example tests passed"


  linuxCoverageTests:
    name: Coverage tests - ID ${{ matrix.testid }}
    runs-on: ubuntu-latest
    needs: [exampleChecks]

    strategy:
      fail-fast: false
      matrix:
        include:
        - testid: 0
          testdir: EXAMPLES/regional_Greece_small
          testflags:
        - testid: 1
          testdir: EXAMPLES/regional_Greece_noise_small
          testflags: --enable-vectorization
        - testid: 2
          testdir: EXAMPLES/regional_Greece_small
          testflags: --enable-vectorization --enable-openmp
        - testid: 3
          testdir: EXAMPLES/global_small
          testflags: --enable-vectorization
          testADIOS2: true
        - testid: 4
          testdir: EXAMPLES/regional_s40rts
          testflags: --enable-vectorization
          testHIP: true
        - testid: 5
          testdir: EXAMPLES/regional_EMC_model
          testflags:
          testEMC: true
          testNetCDF: true
          testHIP: true
        - testid: 6
          testdir: EXAMPLES/regional_Greece_small
          testflags: --enable-vectorization
          testngll: 6

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: ${{ matrix.testHIP == true && 'true' || 'false' }}  # HIP needs submodule content in folder external_libs/ROCm-HIP-CPU/

    - name: Install packages
      env:
        CUDA: ${{ matrix.testCUDA }}
        OPENCL: ${{ matrix.testOpenCL }}
        HIP: ${{ matrix.testHIP }}
        EMC_MODEL: ${{ matrix.testEMC }}
        NETCDF: ${{ matrix.testNetCDF }}
        ADIOS2: $${{ matrix.testADIOS2 }}
      run: ./.github/scripts/run_install.sh
      shell: bash

    - name: Run build (coverage)
      env:
        TESTCOV: true
        CUDA: ${{ matrix.testCUDA }}
        OPENCL: ${{ matrix.testOpenCL }}
        HIP: ${{ matrix.testHIP }}
        NETCDF: ${{ matrix.testNetCDF }}
        ADIOS2: $${{ matrix.testADIOS2 }}
        TESTFLAGS: ${{ matrix.testflags }}
        TESTNGLL: ${{ matrix.testngll }}
      run: ./.github/scripts/run_build.sh
      shell: bash

    - name: Run base test (coverage)
      env:
        TESTCOV: true
        ADIOS2: $${{ matrix.testADIOS2 }}
        TESTDIR: ${{ matrix.testdir }}
        TESTID: ${{ matrix.testid }}
      run: ./.github/scripts/run_tests.sh
      shell: bash

    - name: Run extra coverage examples
      env:
        TESTCOV: true
        TESTID: ${{ matrix.testid }}
      run: ./.github/scripts/run_coverage.sh
      shell: bash

    - name: Generate gcov reports
      if: ${{ github.repository == 'SPECFEM/specfem3d_globe' }}
      env:
        REPOSITORY: ${{ github.repository }}
      run: |
        echo "repository: $REPOSITORY"
        gcov --version
        echo `pwd`
        ls -al obj/
        # produces coverage reports (done manually because of different naming for source & object files)
        find obj/ -iname '*.o' | sort | awk '{print "gcov -o obj/ "$1;}'
        # executes gcov-commands
        find obj/ -iname '*.o' | sort | awk '{print "gcov -o obj/ "$1;}' | sh
      shell: bash

    # code coverage:
    # see script : https://github.com/codecov/codecov-bash/blob/master/codecov
    # see example: https://github.com/codecov/example-fortran/blob/master/.travis.yml
    #- name: Upload coverage to Codecov
    #  if: ${{ github.repository == 'SPECFEM/specfem3d_globe' }}
    #  run: |
    #    bash <(curl -s https://codecov.io/bash) -X gcov; fi
    #  shell: bash

    - name: Upload coverage to Codecov
      if: ${{ github.repository == 'SPECFEM/specfem3d_globe' }}
      uses: codecov/codecov-action@v5
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      with:
        fail_ci_if_error: true
        verbose: true
        flags: coverage-testname-${{ matrix.testname }}
