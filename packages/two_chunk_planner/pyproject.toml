[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "two-chunk-planner"
version = "0.1.0"
description = "Canonical ULVZ two-chunk SPECFEM3D_GLOBE planning and audit tool"
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["numpy", "matplotlib", "PyYAML"]

[project.optional-dependencies]
phase = ["obspy"]
test = ["pytest"]

[project.scripts]
two-chunk-planner = "two_chunk_planner.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
